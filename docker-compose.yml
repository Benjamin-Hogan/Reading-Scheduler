services:
  reading-scheduler:
    build: .
    image: reading-scheduler:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      FEED_DATA_DIR: /data/feeds
      HOSTNAME: 0.0.0.0
      PORT: 3000
    volumes:
      - feed-data:/data/feeds
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  feed-data:
