# Run the pre-built image from GitHub Container Registry (no local build).
# Usage: docker compose -f docker-compose.ghcr.yml up -d
#
# Private repos: docker login ghcr.io -u YOUR_GITHUB_USERNAME
# (use a PAT with read:packages, or `gh auth token` if logged in via GitHub CLI)

services:
  reading-scheduler:
    image: ghcr.io/benjamin-hogan/reading-scheduler:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      FEED_DATA_DIR: /data/feeds
      SYNC_DATA_DIR: /data/sync
      HOSTNAME: 0.0.0.0
      PORT: 3000
    volumes:
      - feed-data:/data/feeds
      - sync-data:/data/sync
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  feed-data:
  sync-data:
